apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
  labels:
    app: sample-app
spec:
  replicas: 1

  selector:
    matchLabels:
      app: sample-app

  template:
    metadata:
      labels:
        app: sample-app

    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: sample-app

        image: <+artifact.image>

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: APP_NAME
          value: "Harness Home Lab"

        - name: APP_VERSION
          value: "<+artifact.tag>"

        - name: APP_ENV
          value: "<+env.name>"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 256Mi